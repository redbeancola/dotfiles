[colors]
disabled = #707880
Rosewater = #f5e0dc
Flamingo = #f2cdcd
Pink = #f5c2e7
Mauve = #cba6f7
Red = #f38ba8
Maroon = #eba0ac
Peach = #fab387
Yellow = #f9e2af
Green = #a6e3a1
Teal = #94e2d5
Sky = #89dceb
Sapphire = #74c7ec
Blue = #89b4fa
Lavender = #b4befe
Base = #1e1e2e
Mantle = #181825

[layout]
height = 1.5%

[bar/left]

width = 16%
offset-x = 1%
offset-y = 1%
height = ${layout.height}
fixed-center = true

background = ${colors.Mantle}
foreground = ${colors.Lavender}

line-size = 1pt

font-0 = "RobotoMono Nerd Font:weight=bold:size=9;2"
font-1 = "RobotoMono Nerd Font:size=10;3"
font-2 = "RobotoMono Nerd Font:size=11;3"
font-3 = "NotoEmoji:scale=11;3"
font-4 = "Noto Sans CJK JP:size=10;3"
font-5 = "RobotoMono Nerd Font:scale=16;3"

modules-left = space space power xworkspaces sep space weather space sep
modules-right = flameshot space copyq space space space

enable-ipc = true

wm-restack = generic

[bar/middle]

width = 14%
offset-x = 43%
offset-y = 1%
height = ${layout.height}
fixed-center = true

background = ${colors.Mantle}
foreground = ${colors.Lavender}

line-size = 1pt

font-0 = "RobotoMono Nerd Font:weight=bold:size=9;2"
font-1 = "RobotoMono Nerd Font:size=10;3"
font-2 = "RobotoMono Nerd Font:size=11;3"
font-3 = "Source Han Sans HC:size=10"

modules-center = day space sep space date space sep space time space space space space space
enable-ipc = true
wm-restack = generic

[bar/right]

width = 8%
offset-x = 91%
offset-y = 1%
height = ${layout.height}
fixed-center = true

background = ${colors.Mantle}
foreground = ${colors.Lavender}

line-size = 1pt

font-0 = "RobotoMono Nerd Font:weight=bold:size=9;2"
font-1 = "RobotoMono Nerd Font:size=10;3"
font-2 = "RobotoMono Nerd Font:size=11;3"

modules-center = space pulseaudio space sep space vpn space space ethernet space
enable-ipc = true

wm-restack = generic

[bar/tray]

width = 9%
offset-x = 81%
offset-y = 1%
height = ${layout.height}
fixed-center = true

background = ${colors.Mantle}
foreground = ${colors.Lavender}

line-size = 1pt

font-0 = "RobotoMono Nerd Font:size=13;3"
font-1 = "Symbols Nerd Font Mono:size=18;3"

modules-left = spapce space space updates
modules-center = tray 

; tray-position = center

; tray-detached = false

; tray-maxsize = 16

enable-ipc = true

wm-restack = generic

[bar/xwindow]

width = 19%
offset-x = 18%
offset-y = 1%
height = ${layout.height}
fixed-center = true

background = ${colors.Mantle}
foreground = ${colors.Lavender}

line-size = 1pt

font-0 = "RobotoMono Nerd Font:weight=bold:size=10;3"
font-1 = "Noto Sans CJK JP:style=Regular;size=10;1"
font-2 = "NotoEmoji:scale=11;3"
font-3 = "Noto Sans CJK JP:size=10;3"

modules-center = space xwindow space
modules-right = minimize space close space space
modules-left = space space float space ontop
enable-ipc = true

double-click-interval = 150

wm-restack = generic

[module/xworkspaces]
type = internal/xworkspaces

label-active =  
label-active-padding = 2
label-active-foreground = ${colors.Lavender}
label-active-font = 2

label-occupied =  
label-occupied-padding = 2
label-occupied-font = 2

label-empty =  
label-empty-foreground = ${colors.disabled}
label-empty-padding = 2
label-empty-font = 2

[module/xwindow]
type = custom/script
format-background = ${colors.Mantle}
format-foreground = ${colors.Lavender}
format-padding = 2
interval = 0.1
exec = "sh ~/.config/polybar/scripts/xwindow.sh"
label-maxlen = 60
click-left = "awesome-client 'maximize(client.focus)'"
click-right = "awesome-client 'client.focus.fullscreen = not client.focus.fullscreen'"
scroll-down = "awesome-client \"require('awful').client.focus.byidx(1)\""
scroll-up = "awesome-client \"require('awful').client.focus.byidx(-1)\""

[module/updates]
type = custom/script
content-font = 2
exec = "awesome-client 'return "󰚰 " .. (update_running and (tostring(update_percent or 0) .. "%") or tostring(update_count or 0))' | awk -F'"' '{print $2}'"
interval = 1
click-left = "awesome-client 'show_update_popup()'"
label-foreground = ${colors.Red}

[module/pulseaudio]
type = internal/pulseaudio
format-volume-prefix = "墳 "
format-volume-prefix-foreground = ${colors.Rosewater}
format-volume = <label-volume>
format-volume-prefix-font = 3

label-volume = %percentage%%

label-muted = muted
label-muted-foreground = ${colors.disabled}
click-right = pavucontrol

[network-base]
type = internal/network
interval = 5
format-connected = <label-connected>
format-disconnected = <label-disconnected>
label-disconnected = disconnected
format-connected-foreground = ${colors.Lavender}

[module/wlan]
inherit = network-base
interface-type = wireless
label-connected-font = 3
label-connected =  
label-connected-foreground = ${colors.Rosewater}

[module/ethernet]
inherit = network-base
interface = enp4s0
label-connected = %upspeed% %downspeed%
;%local_ip%
label-connected-foreground = ${colors.Rosewater}
label-disconnected =   disconnected
label-disconnected-foreground = ${colors.Maroon}

[module/vpn]
type = custom/script
exec = "sh ~/.config/polybar/scripts/vpn_status.sh"
interval = 5

click-left = "sh ~/.config/polybar/scripts/vpn_toggle.sh"
click-right = "sh ~/.config/polybar/scripts/vpn_menu.sh"

label-foreground = ${colors.Rosewater}

[module/day]
type = custom/script
exec = "sh ~/.config/polybar/scripts/day.sh"
interval = 1

click-left = "feh --no-fehbg --bg-scale --randomize ~/Pictures/wallpapers/charlotte/upscaled/*"

label-foreground = ${colors.Lavender}

[module/minimize]
type = custom/text
content =  
click-left = "awesome-client 'client.focus.minimized = true'"
click-right = "awesome-client 'restore()'"
double-click-right = "awesome-client 'restore_all()'"
label-foreground = ${colors.Lavender}

[module/close]
type = custom/text
content =  
click-left = "awesome-client 'if client.focus then client.focus:kill() end'"
click-right = "awesome-client 'maximize(client.focus)'"

label-foreground = ${colors.Lavender}

[module/float]
type = custom/script
exec = " awesome-client 'return client.focus and (client.focus.floating and "  " or "  ") or "  "' | awk -F '"' '{print $2}' "
interval = 0.1
click-left = "awesome-client 'float(client.focus)'"
label-foreground = ${colors.Lavender}

[module/ontop]
type = custom/script
exec = " awesome-client 'return client.focus and (client.focus.ontop and "  " or "  ") or "  "' | awk -F '"' '{print $2}' "
interval = 0.1
click-left = "awesome-client 'client.focus.ontop = not client.focus.ontop'"
label-foreground = ${colors.Lavender}

[module/date]
type = internal/date
interval = 1
date = %d
label = "%{A1: awesome-client 'cal()':}%date%%{A}"
label-foreground = ${colors.Lavender}


[module/time]
type = custom/script
interval = 0.5
exec = "sh ~/.config/polybar/scripts/time.sh"
click-left = "sh ~/.config/polybar/scripts/change_display_tz.sh"
label-foreground = ${colors.Lavender}

[module/battery]
type = internal/battery
poll-interval = 5
full-at = 99
format-full-prefix = "  "
format-charging-prefix = "  "
format-discharging-prefix = "  "
format-full-prefix-foreground = ${colors.Rosewater}
format-charging-prefix-foreground = ${colors.Rosewater}
format-discharging-prefix-foreground = ${colors.Red}
label-charging = %percentage%%
label-discharging = %percentage%%
label-full = %percentage%%

[module/backlight]
type = internal/backlight

; Use the following command to list available cards:
; $ ls -1 /sys/class/backlight/

card = amdgpu_bl1
use-actual-brightness = true
format-prefix = "盛 "
format-prefix-foreground = ${colors.Rosewater}
format-prefix-font = 3
enable-scroll = true

[module/tray]
type = internal/tray
format-margin = 8px
; tray-spacing = 8px
tray-padding = 4px

[module/power]
type = custom/text
content =  
content-font = 3
content-foreground = ${colors.Red}
content-margin = 1
click-left = "sh ~/.config/rofi/powermenu/type-6/powermenu.sh"

[module/weather]
type = custom/script
exec = "sh ~/.config/polybar/scripts/weather.sh"
interval = 700

; decor

[module/flameshot]
type = custom/text
content =   
content-font = 6
content-foreground = ${colors.Lavender}
click-left = "XDG_SESSION_TYPE=x11 WAYLAND_DISPLAY= flameshot gui"
click-right = "flameshot screen -n 1 -c -p ~/Pictures/Screenshots;"

[module/copyq]
type = custom/text
content =   
content-font = 6
content-foreground = ${colors.Lavender}
click-left = "copyq menu"
click-right = "copyq toggle"


[module/sep]
type = custom/text
content = "|"
content-foreground = ${colors.disabled}

[module/space]
type = custom/text
content = " "

[settings]
screenchange-reload = true
pseudo-transparency = true

; vim:ft=dosini
