# {{{ shadow
shadow = true;
# detect-rounded-corners = true;
shadow-radius = 10;
shadow-opacity = 0.75;
shadow-offset-x = -20;
shadow-offset-y = -20;
shadow-exclude = [
	#"name = 'Notification'",
	#"_GTK_FRAME_EXTENTS@:c"
	# "class_i ?= 'riotclientservices.exe'",
	# "class_g ?= 'slop'",
	# "class_g ?= 'Polybar'",
	# "class_g ?= 'Visualizer'",
	# "class_g ?= 'i3-frame'",
	# "_NET_WM_WINDOW_TYPE@:a *= 'SPLASH'",
	# "window_type = 'dropdown_menu'",
	# "window_type = 'menu'",
	# "window_type = 'popup_menu'",
	# "window_type = 'utility'",
	"name = 'Notification'",
	"class_g = 'Conky'",
	"class_g ?= 'Notify-osd'",
	"class_g = 'Cairo-clock'",
	"_GTK_FRAME_EXTENTS@:c",
	"class_g ?= 'firefox' && argb && firefox_default"
];
# }}}


# {{{ opacity
frame-opacity = 0
detect-client-opacity = false;
active-opacity = 1;
inactive-opacity = 0.9;
inactive-dim = 0.3;
inactive-opacity-override = false;

mark-wmwin-focused = true;
mark-ovredir-focused = true;

popup_menu = { opacity = 1; }
dropdown_menu = { opacity = 1; }

focus-exclude = [
  #"class_g = 'Bar'",                    # lemonbar
];
opacity-rule = [
  #"100:window_type = 'normal'",
  "75:class_g = 'kitty' && focused",
  "90:class_g = 'kitty' && !focused",
  "100:_NET_WM_STATE@[0]:32a = '_NET_WM_STATE_FULLSCREEN'",
  "100:_NET_WM_STATE@[1]:32a = '_NET_WM_STATE_FULLSCREEN'",
  "100:_NET_WM_STATE@[2]:32a = '_NET_WM_STATE_FULLSCREEN'",
  "100:_NET_WM_STATE@[3]:32a = '_NET_WM_STATE_FULLSCREEN'",
  "100:_NET_WM_STATE@[4]:32a = '_NET_WM_STATE_FULLSCREEN'"
];
# }}}

# {{{ fading
fading = false;
# fade-in-step = 0.03;
# fade-out-step = 0.03;
fade-in-step = 0.01;
fade-out-step = 0.01;
no-fading-openclose = true;
# no-fading-destroyed-argb = false;
fade-delta = 5;
fade-exclude = [
  # "class_g = 'slop'",
  # "class_g ?= 'firefox'",
  # "window_type = 'dropdown_menu'",
  # "window_type = 'popup_menu'"
]
# }}}

# {{{ corner
corner-radius = 15;
detect-rounded-corners = true;
rounded-corners-exclude = [
	"window_type = 'desktop'",
];
# }}}

transition-length = 300
transition-pow-x = 0.1
transition-pow-y = 0.1
transition-pow-w = 0.1
transition-pow-h = 0.1
size-transition = true


# {{{ blur 
blur: {
  method = "gaussian";
  size = 5;
  deviation = 10.0;
}

# Exclude conditions for background blur.
blur-background-exclude = [
  # "window_type = 'dock'",
  #"window_type = 'desktop'",
  "_GTK_FRAME_EXTENTS@:c"
];
# }}}

# unknown, desktop, dock, toolbar, menu, utility, splash, dialog, normal, dropdown_menu, popup_menu, tooltip, notification, combo, dnd
wintypes:
{
  normal = { fade = true; shadow = false; opacity = 1; }
  tooltip = { fade = false; shadow = false; opacity = .95; focus = true; full-shadow = true; };
  dock = { shadow = false; fade = false; opacity = .95; }
  dnd = { shadow = false; fade = false; opacity = .95; }
  popup_menu = { opacity = 1; }
  dropdown_menu = { opacity = 1; }
};
