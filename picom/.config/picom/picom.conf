# {{{ General
daemon = true;
# glx, xrender, xr_glx_hybrid
backend = "xrender";
vsync = true;
detect-rounded-corners = true;
detect-transient = true;
detect-client-leader = false;
use-damage = true;
log-level = "info";
# Additionally use X Sync fence to sync clients' draw calls. Needed on nvidia-drivers with GLX backend for some users
	# xrender-sync-fence = true; 
# }}}


# {{{ animation
# turn on animation
	animations: true;
# tension, default: 200.0
	animation-stiffness = 110
# default: 1.0
	animation-window-mass = 0.5
# friction, default 25.0
	animation-dampening = 20
# Whether to clamp animations
	animation-clamping = true 
# fly-in, zoom, slide-down, slide-up, slide-left, slide-right 
	animation-for-open-window = "zoom";
# The time between steps in animation, in milliseconds. (> 0, defaults to 10).
	animation-delta = 10
# when minimize window, fly-in, zoom, slide-down, slide-up, slide-left, slide-right, slide-in, slide-out 
	animation-for-unmap-window = "slide-left";
# drop-down, pop-up window...
	animation-for-transient-window = "slide-down";
# }}}
animations = (
  {
    triggers = ["geometry"];
    scale-x = {
      curve = "cubic-bezier(0,0,0,1.28)";
      duration = 0.5;
      start = "window-width-before / window-width";
      end = 1;
    }
    scale-y = {
      curve = "cubic-bezier(0,0,0,1.28)";
      duration = 0.5;
      start = "window-height-before / window-height";
      end = 1;
    }
    offset-x = {
      curve = "cubic-bezier(0,0,0,1.28)";
      duration = 0.5;
      start = "window-x-before - window-x";
      end = 0;
    }
    offset-y = {
      curve = "cubic-bezier(0,0,0,1.28)";
      duration = 0.5;
      start = "window-y-before - window-y";
      end = 0;
    }

    shadow-scale-x = "scale-x";
    shadow-scale-y = "scale-y";
    shadow-offset-x = "offset-x";
    shadow-offset-y = "offset-y";
  },
  {
    triggers = [ "hide", "close" ];
    opacity = {
      curve = "linear";
      duration = 0.3;
      start = 1;
      end = 0;
    }
    scale-x = {
      curve = "cubic-bezier(0,0,0,1.28)";
      duration = 0.5;
      start = 1;
      end = 0;
    }
    scale-y = {
      curve = "cubic-bezier(0,0,0,1.28)";
      duration = 0.5;
      start = 1;
      end = 0;
    }
    offset-x = {
      curve = "cubic-bezier(0,0,0,1.28)";
      duration = 0.5;
      start = 0;
      end = "window-width / 2";
    }
    offset-y = {
      curve = "cubic-bezier(0,0,0,1.28)";
      duration = 0.5;
      start = 0;
      end = "window-height / 2";
    }
    shadow-scale-x = "scale-x";
    shadow-scale-y = "scale-y";
    shadow-offset-x = "offset-x";
    shadow-offset-y = "offset-y";
  },
  {
    triggers = [ "open", "show" ];
    scale-x = {
      curve = "cubic-bezier(0,0,0,1.28)";
      duration = 0.5;
      start = 0;
      end = 1;
    }
    scale-y = {
      curve = "cubic-bezier(0,0,0,1.28)";
      duration = 0.5;
      start = 0;
      end = 1;
    }
    offset-x = {
      curve = "cubic-bezier(0,0,0,1.28)";
      duration = 0.5;
      start = "window-width / 2";
      end = 0;
    }
    offset-y = {
      curve = "cubic-bezier(0,0,0,1.28)";
      duration = 0.5;
      start = "window-height / 2";
      end = 0;
    }

    shadow-scale-x = "scale-x";
    shadow-scale-y = "scale-y";
    shadow-offset-x = "offset-x";
    shadow-offset-y = "offset-y";
  },
)

